name": "よこやまろうそく", "closingDay": "", "paymentDay": "", "paymentMethod": "", "memo": "", "products": []}, {"code": "K0050", "name": "じゅん平", "closingDay": "", "paymentDay": "", "paymentMethod": "", "memo": "", "products": []}]};let master=null;function nowText(){const d=new Date();return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}function normalizeCode(v){return String(v||"").trim().toUpperCase()}function byCode(code){return master.stores.find(s=>normalizeCode(s.code)===normalizeCode(code))}function updateStatus(msg){document.getElementById("syncStatus").textContent=msg}function saveLocal(){master.updated=nowText();localStorage.setItem(LOCAL_KEY,JSON.stringify(master));updateStatus("端末保存済み："+master.updated)}function initDefaultMaster(){let m=JSON.parse(JSON.stringify(DEFAULT_MASTER));m.stores=JSON.parse(JSON.stringify(DEFAULT_STORES));return m}async function loadMaster(){let local=localStorage.getItem(LOCAL_KEY);master=local?JSON.parse(local):initDefaultMaster();try{const res=await fetch(REMOTE_MASTER_URL+"?v="+Date.now(),{cache:"no-store"});if(res.ok){const remote=await res.json();if(remote&&Array.isArray(remote.stores)){master=remote;localStorage.setItem(LOCAL_KEY,JSON.stringify(master));updateStatus("最新データ取得済み："+(master.updated||nowText()))}}catch(e){updateStatus(local?"オフライン表示中："+(master.updated||"保存データ"):"初期データで表示中")}renderStoreSelect()}function showOnly(id){["home","storePage","adminLogin","admin"].forEach(x=>document.getElementById(x).classList.add("hidden"));document.getElementById(id).classList.remove("hidden")}function showHome(){showOnly("home");document.getElementById("searchCode").focus()}function showAdminLogin(){showOnly("adminLogin");document.getElementById("adminPass").value="";document.getElementById("adminPass").focus()}function loginAdmin(){if(document.getElementById("adminPass").value===ADMIN_PASSWORD){renderS ((p,i)=>productRow(p,i)).join("")}function productRow(p,i){return '<div class="productBox" data-i="'+i+'"><label>商品名</label><input class="pName" type="text" value="'+escAttr(p.name||"")+'"><label>価格</label><input class="pPrice" type="number" value="'+escAttr(p.price||"")+'"><label>税込/税抜</label><select class="pTax"><option '+((p.tax||"税込")==="税込"?"selected":"")+'>税込</option><option '+((p.tax||"")==="税抜"?"selected":"")+'>税抜</option></select><button class="red" onclick="removeProduct('+i+')">この商品を削除</button></div>'}function collectProducts(){return [...document.querySelectorAll(".productBox")].map(box=>({name:box.querySelector(".pName").value.trim(),price:box.querySelector(".pPrice").value.trim(),tax:box.querySelector(".pTax").value})).filter(p=>p.name||p.price)}function saveAdminStore(){const oldCode=document.getElementById("adminStoreSelect").value;const s=byCode(oldCode);if(!s)return;const newCode=normalizeCode(document.getElementById("aCode").value);if(!newCode){alert("店舗コードが空やで");return}s.code=newCode;s.name=document.getElementById("aName").value.trim();s.closingDay=document.getElementById("aClosing").value.trim();s.paymentDay=document.getElementById("aPaymentDay").value.trim();s.paymentMethod=document.getElementById("aPaymentMethod").value.trim();s.memo=document.getElementById("aMemo").value.trim();s.products=collectProducts();saveLocal();renderStoreSelect();document.getElementById("adminStoreSelect").value=newCode;alert("保存したで")}function addProduct(){const arr=collectProducts();arr.push({name:"",price:"",tax:"税込"});renderAdminProducts(arr)}function removeProduct(i){const arr=collectProducts();arr.splice(i,1);renderAdminProducts(arr)}function addStore(){const code=prompt("新しい店舗コードを入力して（例：K0051）");if(!code)return;const c=normalizeCode(code);if(byCode(c)){alert("そのコードは既にあるで");return}const name=prompt("店舗名を入力して")||"";master.stores.push({code:c,name:name,closingDay:"",paymentDay:"",paymentMethod:"",memo:"",products:[]});saveLocal();renderStoreSelect();document.getElementById("adminStoreSelect").value=c;loadAdminStore()}function deleteStore(){const code=document.getElementById("adminStoreSelect").value;const s=byCode(code);if(!s)return;if(!confirm(s.code+" "+s.name+" を削除する？"))return;master.stores=master.stores.filter(x=>normalizeCode(x.code)!==normalizeCode(code));saveLocal();renderStoreSelect();loadAdminStore()}function copyProducts(){const from=byCode(document.getElementById("adminStoreSelect").value);if(!from)return;const to=prompt("コピー先の店舗コードをカンマ区切りで入力\n例：K0011,K0013");if(!to)return;to.split(",").map(normalizeCode).filter(Boolean).forEach(code=>{const s=byCode(code);if(s)s.products=JSON.parse(JSON.stringify(collectProducts()))});saveLocal();alert("コピーしたで")}function bulkPrice(){const yen=Number(prompt("全商品に加算する金額を入力。値下げは -20 みたいに入力"));if(!Number.isFinite(yen))return;if(!confirm("全店舗の全商品を "+yen+"円 変更する？"))return;master.stores.forEach(s=>(s.products||[]).forEach(p=>{p.price=String((Number(p.price)||0)+yen)}));saveLocal();loadAdminStore();alert("一括変更したで")}function downloadMaster(){master.updated=nowText();downloadFile("price_master.json",JSON.stringify(master,null,2))}function downloadBackup(){master.updated=nowText();downloadFile("backup_price_master_"+Date.now()+".json",JSON.stringify(master,null,2))}function downloadFile(name,content){const blob=new Blob([content],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}async function manualUpdate(){await loadMaster();alert("更新確認したで")}function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}function escAttr(s){return esc(s)}document.getElementById("searchCode").addEventListener("input",e=>{const v=normalizeCode(e.target.value);if(/^K\d{4}$/.test(v)&&byCode(v))showStore(v)});loadMaster();</script></body></html>
